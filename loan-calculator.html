<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator – Monthly Loan Payment Calculator | EG Tools Online</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:520px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    padding:25px;
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#007bff;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
    font-size:16px;
}

.calculate{
    background:#007bff;
}

.calculate:hover{
    background:#0056b3;
}

.reset{
    background:#dc3545;
}

.reset:hover{
    background:#b02a37;
}

.result{
    margin-top:25px;
    background:#f8f9fa;
    padding:18px;
    border-radius:10px;
}

.result p{
    margin:12px 0;
    font-size:17px;
}

.result span{
    color:#007bff;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>EMI Calculator</h1>

<div class="input-group">
<label>Loan Amount</label>
<input type="number" id="loan" placeholder="100000">
</div>

<div class="input-group">
<label>Annual Interest Rate (%)</label>
<input type="number" id="rate" placeholder="10">
</div>

<div class="input-group">
<label>Loan Tenure (Years)</label>
<input type="number" id="years" placeholder="5">
</div>

<div class="buttons">
<button class="calculate" onclick="calculateEMI()">Calculate</button>
<button class="reset" onclick="resetForm()">Reset</button>
</div>

<div class="result">
<p>Monthly EMI: <span id="emi">0.00</span></p>
<p>Total Interest: <span id="interest">0.00</span></p>
<p>Total Payment: <span id="payment">0.00</span></p>
</div>

</div>

<script>

function calculateEMI(){

let loan=parseFloat(document.getElementById("loan").value);
let annualRate=parseFloat(document.getElementById("rate").value);
let years=parseFloat(document.getElementById("years").value);

if(isNaN(loan)||isNaN(annualRate)||isNaN(years)||loan<=0||annualRate<0||years<=0){

alert("Please enter valid values.");
return;

}

let monthlyRate=annualRate/12/100;
let months=years*12;

let emi;

if(monthlyRate===0){

emi=loan/months;

}else{

emi=(loan*monthlyRate*Math.pow(1+monthlyRate,months))/
(Math.pow(1+monthlyRate,months)-1);

}

let totalPayment=emi*months;
let totalInterest=totalPayment-loan;

document.getElementById("emi").innerHTML=emi.toFixed(2);

document.getElementById("interest").innerHTML=totalInterest.toFixed(2);

document.getElementById("payment").innerHTML=totalPayment.toFixed(2);

}

function resetForm(){

document.getElementById("loan").value="";
document.getElementById("rate").value="";
document.getElementById("years").value="";

document.getElementById("emi").innerHTML="0.00";
document.getElementById("interest").innerHTML="0.00";
document.getElementById("payment").innerHTML="0.00";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:550px;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

select,input{
width:100%;
padding:12px;
margin-bottom:15px;
border:2px solid #ddd;
border-radius:8px;
font-size:16px;
outline:none;
}

select:focus,
input:focus{
border-color:#007bff;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#007bff;
color:#fff;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
padding:15px;
background:#f8f9fa;
border-radius:8px;
text-align:center;
font-size:20px;
font-weight:bold;
color:#007bff;
}
</style>
</head>

<body>

<div class="container">

<h1>Unit Converter</h1>

<label>Category</label>

<select id="category" onchange="loadUnits()">
<option value="length">Length</option>
<option value="weight">Weight</option>
<option value="temperature">Temperature</option>
<option value="area">Area</option>
<option value="volume">Volume</option>
<option value="speed">Speed</option>
</select>

<label>Value</label>
<input type="number" id="value" placeholder="Enter value">

<label>From</label>
<select id="from"></select>

<label>To</label>
<select id="to"></select>

<div class="buttons">
<button onclick="convert()">Convert</button>
<button onclick="swap()">Swap</button>
<button onclick="copyResult()">Copy</button>
<button onclick="resetAll()">Reset</button>
</div>

<div class="result" id="result">0</div>

</div>

<script>

const units={

length:{
Meter:1,
Kilometer:1000,
Centimeter:0.01,
Millimeter:0.001,
Mile:1609.344,
Yard:0.9144,
Foot:0.3048,
Inch:0.0254
},

weight:{
Kilogram:1,
Gram:0.001,
Milligram:0.000001,
Pound:0.453592,
Ounce:0.0283495
},

area:{
"Square Meter":1,
"Square Kilometer":1000000,
Hectare:10000,
Acre:4046.856,
"Square Foot":0.092903,
"Square Inch":0.00064516
},

volume:{
Liter:1,
Milliliter:0.001,
"Cubic Meter":1000,
Gallon:3.78541,
Cup:0.236588
},

speed:{
"m/s":1,
"km/h":0.277778,
mph:0.44704,
knot:0.514444
}

};

function loadUnits(){

let cat=document.getElementById("category").value;

let from=document.getElementById("from");
let to=document.getElementById("to");

from.innerHTML="";
to.innerHTML="";

if(cat==="temperature"){

["Celsius","Fahrenheit","Kelvin"].forEach(u=>{

from.innerHTML+=`<option>${u}</option>`;
to.innerHTML+=`<option>${u}</option>`;

});

return;

}

for(let unit in units[cat]){

from.innerHTML+=`<option>${unit}</option>`;
to.innerHTML+=`<option>${unit}</option>`;

}

}

loadUnits();

function convert(){

let value=parseFloat(document.getElementById("value").value);

if(isNaN(value)){

alert("Enter value");

return;

}

let cat=document.getElementById("category").value;

let from=document.getElementById("from").value;

let to=document.getElementById("to").value;

let result;

if(cat==="temperature"){

result=tempConvert(value,from,to);

}else{

let base=value*units[cat][from];

result=base/units[cat][to];

}

document.getElementById("result").innerHTML=result.toFixed(4);

}

function tempConvert(v,f,t){

if(f===t)return v;

if(f==="Celsius"){

if(t==="Fahrenheit") return(v*9/5)+32;

if(t==="Kelvin") return v+273.15;

}

if(f==="Fahrenheit"){

if(t==="Celsius") return(v-32)*5/9;

if(t==="Kelvin") return((v-32)*5/9)+273.15;

}

if(f==="Kelvin"){

if(t==="Celsius") return v-273.15;

if(t==="Fahrenheit") return((v-273.15)*9/5)+32;

}

}

function swap(){

let from=document.getElementById("from");
let to=document.getElementById("to");

let temp=from.value;

from.value=to.value;

to.value=temp;

convert();

}

function copyResult(){

navigator.clipboard.writeText(document.getElementById("result").innerHTML);

alert("Copied!");

}

function resetAll(){

document.getElementById("value").value="";

document.getElementById("result").innerHTML="0";

document.getElementById("category").selectedIndex=0;

loadUnits();

}

document.getElementById("value").addEventListener("input",convert);

</script>

</body>
</html>

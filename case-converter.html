<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter Tool</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

textarea{
    width:100%;
    height:220px;
    resize:vertical;
    padding:15px;
    font-size:16px;
    border:2px solid #ddd;
    border-radius:8px;
    outline:none;
}

textarea:focus{
    border-color:#007bff;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-top:20px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:#fff;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}

.info{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    flex-wrap:wrap;
    gap:10px;
    font-weight:bold;
    color:#444;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
    font-size:14px;
}

@media(max-width:600px){
    .info{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<div class="container">

<h1>Case Converter Tool</h1>

<textarea id="text" placeholder="Type or Paste your text here..."></textarea>

<div class="buttons">

<button onclick="toUpper()">UPPERCASE</button>

<button onclick="toLower()">lowercase</button>

<button onclick="toTitle()">Title Case</button>

<button onclick="toSentence()">Sentence Case</button>

<button onclick="capitalizeWords()">Capitalize Words</button>

<button onclick="alternateCase()">aLtErNaTiNg</button>

<button onclick="copyText()">Copy Text</button>

<button onclick="clearText()">Clear</button>

</div>

<div class="info">
<div>Characters : <span id="char">0</span></div>
<div>Words : <span id="word">0</span></div>
<div>Lines : <span id="line">0</span></div>
</div>

<div class="footer">
Made with HTML, CSS & JavaScript
</div>

</div>

<script>

const textarea=document.getElementById("text");

textarea.addEventListener("input",updateInfo);

function updateInfo(){

let txt=textarea.value;

document.getElementById("char").innerText=txt.length;

document.getElementById("word").innerText=
txt.trim()==""?0:txt.trim().split(/\s+/).length;

document.getElementById("line").innerText=
txt==""?0:txt.split(/\n/).length;

}

function toUpper(){
textarea.value=textarea.value.toUpperCase();
updateInfo();
}

function toLower(){
textarea.value=textarea.value.toLowerCase();
updateInfo();
}

function toTitle(){

let txt=textarea.value.toLowerCase().split(" ");

for(let i=0;i<txt.length;i++){

if(txt[i].length>0){

txt[i]=txt[i][0].toUpperCase()+txt[i].substring(1);

}

}

textarea.value=txt.join(" ");

updateInfo();

}

function capitalizeWords(){

let words=textarea.value.split(/\s+/);

let result=words.map(word=>{

if(word.length===0)return "";

return word.charAt(0).toUpperCase()+word.slice(1).toLowerCase();

});

textarea.value=result.join(" ");

updateInfo();

}

function toSentence(){

let txt=textarea.value.toLowerCase();

textarea.value=txt.charAt(0).toUpperCase()+txt.slice(1);

updateInfo();

}

function alternateCase(){

let txt=textarea.value;

let result="";

for(let i=0;i<txt.length;i++){

result+=i%2==0?txt[i].toLowerCase():txt[i].toUpperCase();

}

textarea.value=result;

updateInfo();

}

function copyText(){

textarea.select();

document.execCommand("copy");

alert("Copied Successfully!");

}

function clearText(){

textarea.value="";

updateInfo();

}

updateInfo();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder – Encode Text to Base64 Online | EG Tools Online</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:850px;
    background:#1e293b;
    border-radius:15px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:180px;
    resize:vertical;
    border:none;
    border-radius:10px;
    padding:15px;
    font-size:16px;
    outline:none;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

button{
    flex:1;
    min-width:120px;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.encode{background:#2563eb;color:#fff;}
.decode{background:#16a34a;color:#fff;}
.copy{background:#9333ea;color:#fff;}
.clear{background:#dc2626;color:#fff;}
.download{background:#f59e0b;color:#000;}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>🔐 Base64 Encoder & Decoder</h1>

<label>Input</label>
<textarea id="input" placeholder="Enter text or Base64..."></textarea>

<div class="buttons">
<button class="encode" onclick="encodeText()">Encode</button>
<button class="decode" onclick="decodeText()">Decode</button>
<button class="copy" onclick="copyOutput()">Copy Output</button>
<button class="clear" onclick="clearAll()">Clear</button>
<button class="download" onclick="downloadOutput()">Download</button>
</div>

<label>Output</label>
<textarea id="output" readonly></textarea>

</div>

<script>

function encodeText(){
    const input=document.getElementById("input").value;

    try{
        document.getElementById("output").value=
        btoa(unescape(encodeURIComponent(input)));
    }catch{
        alert("Unable to encode.");
    }
}

function decodeText(){
    const input=document.getElementById("input").value;

    try{
        document.getElementById("output").value=
        decodeURIComponent(escape(atob(input.trim())));
    }catch{
        alert("Invalid Base64 String.");
    }
}

function copyOutput(){
    const out=document.getElementById("output");

    if(!out.value){
        alert("Nothing to copy.");
        return;
    }

    navigator.clipboard.writeText(out.value);
    alert("Copied!");
}

function clearAll(){
    document.getElementById("input").value="";
    document.getElementById("output").value="";
}

function downloadOutput(){

    const text=document.getElementById("output").value;

    if(!text){
        alert("Nothing to download.");
        return;
    }

    const blob=new Blob([text],{type:"text/plain"});
    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");
    a.href=url;
    a.download="base64-output.txt";
    a.click();

    URL.revokeObjectURL(url);

}

</script>

</body>
</html>

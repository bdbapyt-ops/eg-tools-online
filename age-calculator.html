<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator – Calculate Your Exact Age Online | EG Tools Online</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:420px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:#fff;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#3730a3;
}

.result{
    margin-top:20px;
    background:#f3f4f6;
    padding:15px;
    border-radius:10px;
    line-height:1.8;
}

.result p{
    margin:5px 0;
}

strong{
    color:#4f46e5;
}
</style>
</head>

<body>

<div class="container">

<h2>🎂 Age Calculator</h2>

<label>Select Your Date of Birth</label>

<input type="date" id="dob">

<button onclick="calculateAge()">Calculate Age</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateAge(){

const dob=document.getElementById("dob").value;

if(!dob){
alert("Please select your birth date.");
return;
}

const birth=new Date(dob);
const today=new Date();

if(birth>today){
alert("Birth date cannot be in the future.");
return;
}

let years=today.getFullYear()-birth.getFullYear();
let months=today.getMonth()-birth.getMonth();
let days=today.getDate()-birth.getDate();

if(days<0){
months--;
const lastMonth=new Date(today.getFullYear(),today.getMonth(),0);
days+=lastMonth.getDate();
}

if(months<0){
years--;
months+=12;
}

const diff=today-birth;

const totalDays=Math.floor(diff/(1000*60*60*24));
const totalWeeks=Math.floor(totalDays/7);
const totalMonths=years*12+months;
const totalHours=totalDays*24;
const totalMinutes=totalHours*60;

document.getElementById("result").innerHTML=`
<p><strong>Age:</strong> ${years} Years ${months} Months ${days} Days</p>
<p><strong>Total Months:</strong> ${totalMonths}</p>
<p><strong>Total Weeks:</strong> ${totalWeeks}</p>
<p><strong>Total Days:</strong> ${totalDays}</p>
<p><strong>Total Hours:</strong> ${totalHours.toLocaleString()}</p>
<p><strong>Total Minutes:</strong> ${totalMinutes.toLocaleString()}</p>
`;

}

</script>

</body>
</html>

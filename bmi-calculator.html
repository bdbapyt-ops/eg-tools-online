<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator – Body Mass Index Calculator | EG Tools Online</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:16px;
    padding:25px;
    box-shadow:0 12px 30px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#1e3a8a;
}

label{
    display:block;
    margin:12px 0 6px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    margin-top:20px;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:#fff;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:20px;
    background:#f8fafc;
    border-radius:10px;
    padding:15px;
    display:none;
}

.result h3{
    color:#2563eb;
    margin-bottom:10px;
}

.result p{
    margin:8px 0;
    font-size:16px;
}
</style>
</head>
<body>

<div class="container">

<h2>⚖️ BMI Calculator</h2>

<label>Height (cm)</label>
<input type="number" id="height" placeholder="e.g. 170">

<label>Weight (kg)</label>
<input type="number" id="weight" placeholder="e.g. 65">

<button onclick="calculateBMI()">Calculate BMI</button>

<div class="result" id="result">
    <h3>Your Result</h3>
    <p><strong>BMI:</strong> <span id="bmi"></span></p>
    <p><strong>Category:</strong> <span id="category"></span></p>
    <p><strong>Healthy BMI Range:</strong> 18.5 - 24.9</p>
</div>

</div>

<script>

function calculateBMI(){

    const height = parseFloat(document.getElementById("height").value);
    const weight = parseFloat(document.getElementById("weight").value);

    if(isNaN(height) || isNaN(weight) || height<=0 || weight<=0){
        alert("Please enter valid height and weight.");
        return;
    }

    const meter = height / 100;
    const bmi = weight / (meter * meter);

    let category = "";

    if(bmi < 18.5){
        category = "🔵 Underweight";
    }
    else if(bmi < 25){
        category = "🟢 Normal Weight";
    }
    else if(bmi < 30){
        category = "🟠 Overweight";
    }
    else{
        category = "🔴 Obese";
    }

    document.getElementById("bmi").textContent = bmi.toFixed(2);
    document.getElementById("category").textContent = category;

    document.getElementById("result").style.display = "block";
}

</script>

</body>
</html>

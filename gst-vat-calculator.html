<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST & VAT Calculator – Tax Calculator Online | EG Tools Online</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:520px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

input:focus,
select:focus{
    border-color:#007bff;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
    font-size:16px;
}

.calculate{
    background:#007bff;
}

.calculate:hover{
    background:#0056b3;
}

.reset{
    background:#dc3545;
}

.reset:hover{
    background:#b52b3a;
}

.result{
    margin-top:25px;
    background:#f8f9fa;
    padding:18px;
    border-radius:10px;
}

.result p{
    margin:12px 0;
    font-size:17px;
}

.result span{
    color:#007bff;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>GST / VAT Calculator</h1>

<div class="input-group">
<label>Amount</label>
<input type="number" id="amount" placeholder="Enter amount">
</div>

<div class="input-group">
<label>GST / VAT Rate (%)</label>
<input type="number" id="rate" placeholder="15">
</div>

<div class="input-group">
<label>Calculation Type</label>

<select id="type">
<option value="add">Add GST / VAT</option>
<option value="remove">Remove GST / VAT</option>
</select>

</div>

<div class="buttons">
<button class="calculate" onclick="calculateTax()">Calculate</button>
<button class="reset" onclick="resetForm()">Reset</button>
</div>

<div class="result">

<p>Tax Amount:
<span id="tax">0.00</span>
</p>

<p>Final Amount:
<span id="final">0.00</span>
</p>

</div>

</div>

<script>

function calculateTax(){

let amount=parseFloat(document.getElementById("amount").value);
let rate=parseFloat(document.getElementById("rate").value);
let type=document.getElementById("type").value;

if(isNaN(amount)||isNaN(rate)||amount<=0||rate<0){

alert("Please enter valid values.");
return;

}

let tax,finalAmount;

if(type==="add"){

tax=amount*(rate/100);
finalAmount=amount+tax;

}else{

finalAmount=amount/(1+rate/100);
tax=amount-finalAmount;

}

document.getElementById("tax").innerHTML=tax.toFixed(2);
document.getElementById("final").innerHTML=finalAmount.toFixed(2);

}

function resetForm(){

document.getElementById("amount").value="";
document.getElementById("rate").value="";
document.getElementById("type").value="add";

document.getElementById("tax").innerHTML="0.00";
document.getElementById("final").innerHTML="0.00";

}

</script>

</body>
</html>

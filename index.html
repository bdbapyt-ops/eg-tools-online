<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Tools Hub 2025</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#0a0a1a;
            --card:rgba(255,255,255,0.04);
            --border:rgba(255,255,255,0.08);
            --accent:#0066ff;
            --text:#e2e8f0;
            --text2:#94a3b8;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
            background-image:radial-gradient(circle at 10% 20%,rgba(0,102,255,0.1)0%,transparent 20%),
                             radial-gradient(circle at 90% 80%,rgba(102,0,255,0.1)0%,transparent 20%);}
        header{text-align:center;padding:100px 20px 70px;}
        .logo{width:90px;height:90px;background:linear-gradient(135deg,#0066ff,#00d4ff);border-radius:24px;
              display:inline-flex;align-items:center;justify-content:center;font-size:3rem;color:white;
              box-shadow:0 20px 40px rgba(0,102,255,0.4);margin-bottom:20px;}
        h1{font-size:3.8rem;font-weight:700;background:linear-gradient(90deg,#fff,#a0d8ff);-webkit-background-clip:text;
           -webkit-text-fill-color:transparent;margin-bottom:12px;}
        .tagline{font-size:1.3rem;color:var(--text2);max-width:800px;margin:0 auto;}
        .search-wrapper{max-width:700px;margin:40px auto 0;padding:0 20px;position:relative;}
        #search{width:100%;padding:18px 60px 18px 24px;border:1px solid var(--border);border-radius:16px;
                background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);color:white;font-size:1.1rem;outline:none;}
        #search:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,102,255,0.2);}
        .search-icon{position:absolute;right:40px;top:50%;transform:translateY(-50%);color:#64748b;font-size:1.3rem;}
        .container{max-width:1450px;margin:0 auto;padding:0 20px;}
        .category{margin:90px 0 30px;}
        .cat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;padding:0 10px;}
        .cat-title{font-size:1.9rem;font-weight:600;color:white;}
        .cat-title i{margin-right:12px;color:var(--accent);}
        .count{background:rgba(0,102,255,0.2);color:var(--accent);padding:6px 16px;border-radius:30px;font-size:0.9rem;}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;}
        .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:30px;cursor:pointer;
              transition:all 0.4s;position:relative;overflow:hidden;display:block;text-decoration:none;color:inherit;}
        .card::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%;background:var(--accent);
                        transform:scaleY(0);transition:0.4s;}
        .card:hover::before{transform:scaleY(1);}
        .card:hover{transform:translateY(-12px);border-color:var(--accent);background:rgba(255,255,255,0.08);
                    box-shadow:0 25px 50px rgba(0,0,0,0.4);}
        .icon{width:64px;height:64px;background:rgba(0,102,255,0.15);border-radius:18px;display:flex;
              align-items:center;justify-content:center;font-size:2rem;color:var(--accent);margin-bottom:20px;}
        .card h3{font-size:1.38rem;font-weight:600;margin-bottom:8px;color:white;}
        .card p{font-size:0.98rem;color:var(--text2);}
        footer{text-align:center;padding:100px 20px 50px;color:#64748b;font-size:0.98rem;}
        @media(max-width:768px){
            h1{font-size:2.9rem;}
            .grid{grid-template-columns:1fr;gap:20px;}
            .cat-head{flex-direction:column;text-align:center;gap:12px;}
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fas fa-toolbox"></i></div>
    <h1>EG Tools Online</h1>
    <p class="tagline">A curated collection of useful web tools in one clean dashboard</p>
    <div class="search-wrapper">
        <input type="text" id="search" placeholder="Search any tool..." onkeyup="searchTools()">
        <i class="fas fa-search search-icon"></i>
    </div>
</header>

<div class="container">
    <div class="category">
        <div class="cat-head"><h2 class="cat-title"><i class="fas fa-tools"></i>All Tools</h2><span class="count" id="toolCount">0 Tools</span></div>
        <div class="grid" id="toolGrid"></div>
    </div>
</div>

<footer>
    EG Tools Online • 28 Useful Web Tools • Fast & Simple<br>
    Built for everyday tasks and quick calculations
</footer>

<script>
const tools = [
    { name: 'Authenticator', file: 'authenticator.html', description: 'Generate or verify codes', icon: 'fa-shield-halved' },
    { name: 'Email Generator', file: 'email-genarator.html', description: 'Generate random email addresses', icon: 'fa-envelope' },
    { name: 'Fake Name Generator', file: 'fackname-genarator.html', description: 'Create fake names instantly', icon: 'fa-user' },
    { name: 'QR Generator', file: 'QR-genarator.html', description: 'Generate QR codes', icon: 'fa-qrcode' },
    { name: 'JSON Validator', file: 'json-validator.html', description: 'Validate JSON syntax', icon: 'fa-check-double' },
    { name: 'Age Calculator', file: 'age-calculator.html', description: 'Calculate age from dates', icon: 'fa-calendar-days' },
    { name: 'Base64 Decoder', file: 'base64-decoder.html', description: 'Decode base64 strings', icon: 'fa-code' },
    { name: 'Base64 Encoder', file: 'base64-encoder.html', description: 'Encode text to base64', icon: 'fa-code' },
    { name: 'BMI Calculator', file: 'bmi-calculator.html', description: 'Check body mass index', icon: 'fa-weight-scale' },
    { name: 'Case Converter', file: 'case-converter.html', description: 'Transform text cases', icon: 'fa-font' },
    { name: 'Character Counter', file: 'character-counter.html', description: 'Count characters and words', icon: 'fa-hashtag' },
    { name: 'Compound Interest Calculator', file: 'compound-interest-calculator.html', description: 'Estimate compound growth', icon: 'fa-chart-line' },
    { name: 'Discount Calculator', file: 'discount-calculator.html', description: 'Compute savings quickly', icon: 'fa-tags' },
    { name: 'EMI Calculator', file: 'emi-calculator.html', description: 'Plan loan repayments', icon: 'fa-money-bill-wave' },
    { name: 'GST VAT Calculator', file: 'gst-vat-calculator.html', description: 'Calculate tax amounts', icon: 'fa-receipt' },
    { name: 'Image Compressor', file: 'image-compressor.html', description: 'Reduce image size', icon: 'fa-image' },
    { name: 'Image Cropper', file: 'image-cropper.html', description: 'Crop images easily', icon: 'fa-crop-simple' },
    { name: 'Image Resizer', file: 'image-resizer.html', description: 'Resize images for web', icon: 'fa-expand' },
    { name: 'JSON Formatter', file: 'json-formatter.html', description: 'Format and prettify JSON', icon: 'fa-brackets-curly' },
    { name: 'Length Converter', file: 'length-converter.html', description: 'Convert length values', icon: 'fa-ruler' },
    { name: 'Loan Calculator', file: 'loan-calculator.html', description: 'Estimate loan details', icon: 'fa-landmark' },
    { name: 'Lorem Generator', file: 'lorem-generator.html', description: 'Generate dummy text', icon: 'fa-align-left' },
    { name: 'Mortgage Calculator', file: 'mortgage-calculator.html', description: 'Estimate mortgage payments', icon: 'fa-house' },
    { name: 'Password Generator', file: 'password-generator.html', description: 'Create secure passwords', icon: 'fa-key' },
    { name: 'Percentage Calculator', file: 'percentage-calculator.html', description: 'Solve percentage problems', icon: 'fa-percent' },
    { name: 'Remove Duplicate Lines', file: 'remove-duplicate-lines.html', description: 'Clean repeated lines', icon: 'fa-copy' },
    { name: 'Unit Converter', file: 'unit-converter.html', description: 'Convert common units', icon: 'fa-arrows-left-right' },
    { name: 'UUID Generator', file: 'uuid-generator.html', description: 'Generate unique IDs', icon: 'fa-fingerprint' },
    { name: 'Weight Converter', file: 'weight-converter.html', description: 'Convert weight units', icon: 'fa-scale-balanced' },
    { name: 'Word Counter', file: 'word-counter.html', description: 'Count words and letters', icon: 'fa-file-word' }
];

const grid = document.getElementById('toolGrid');
const count = document.getElementById('toolCount');

tools.forEach(tool => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = tool.file;
    card.innerHTML = `<div class="icon"><i class="fas ${tool.icon}"></i></div><h3>${tool.name}</h3><p>${tool.description}</p>`;
    grid.appendChild(card);
});

count.textContent = `${tools.length} Tools`;

function searchTools(){
    let s=document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c=>{
        c.style.display = c.textContent.toLowerCase().includes(s) ? '' : 'none';
    });
}
</script>
</body>
</html>

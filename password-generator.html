<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator – Secure Random Password Tool | EG Tools Online</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.output{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.output input{
    flex:1;
    padding:12px;
    font-size:16px;
    border:2px solid #ddd;
    border-radius:8px;
    outline:none;
}

.output button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#28a745;
    color:#fff;
    cursor:pointer;
}

.option{
    margin:12px 0;
}

.option label{
    margin-left:8px;
}

input[type=range]{
    width:100%;
}

#lengthValue{
    font-weight:bold;
    color:#007bff;
}

.generate{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.generate:hover{
    background:#0056b3;
}

.strength{
    margin-top:20px;
    padding:12px;
    background:#f8f9fa;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Password Generator</h1>

<div class="output">
<input type="text" id="password" readonly>
<button onclick="copyPassword()">Copy</button>
</div>

<label>Password Length :
<span id="lengthValue">12</span>
</label>

<input
type="range"
id="length"
min="4"
max="64"
value="12">

<div class="option">
<input type="checkbox" id="upper" checked>
<label>Uppercase (A-Z)</label>
</div>

<div class="option">
<input type="checkbox" id="lower" checked>
<label>Lowercase (a-z)</label>
</div>

<div class="option">
<input type="checkbox" id="number" checked>
<label>Numbers (0-9)</label>
</div>

<div class="option">
<input type="checkbox" id="symbol" checked>
<label>Symbols (!@#$...)</label>
</div>

<button class="generate" onclick="generatePassword()">
Generate Password
</button>

<div class="strength">
Strength :
<span id="strength">Medium</span>
</div>

</div>

<script>

const length=document.getElementById("length");
const lengthValue=document.getElementById("lengthValue");

length.oninput=function(){

lengthValue.innerHTML=this.value;

}

function generatePassword(){

let chars="";

if(document.getElementById("upper").checked)
chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

if(document.getElementById("lower").checked)
chars+="abcdefghijklmnopqrstuvwxyz";

if(document.getElementById("number").checked)
chars+="0123456789";

if(document.getElementById("symbol").checked)
chars+="!@#$%^&*()_+{}[]<>?/|~";

if(chars===""){

alert("Select at least one option.");

return;

}

let password="";

for(let i=0;i<length.value;i++){

password+=chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

document.getElementById("password").value=password;

checkStrength(password);

}

function checkStrength(pass){

let score=0;

if(pass.length>=8) score++;
if(/[A-Z]/.test(pass)) score++;
if(/[a-z]/.test(pass)) score++;
if(/[0-9]/.test(pass)) score++;
if(/[^A-Za-z0-9]/.test(pass)) score++;

let text="";

if(score<=2)
text="Weak";

else if(score<=4)
text="Medium";

else
text="Strong";

document.getElementById("strength").innerHTML=text;

}

function copyPassword(){

let pass=document.getElementById("password");

if(pass.value===""){

alert("Generate password first.");

return;

}

navigator.clipboard.writeText(pass.value);

alert("Password Copied!");

}

generatePassword();

</script>

</body>
</html>
